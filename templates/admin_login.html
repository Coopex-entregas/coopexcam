{% extends 'base.html' %}{% block title %}Login Admin - CoopexCam{% endblock %}{% block body %}
<div class="auth-shell">
  <div class="auth-card card">
    <div class="brand">COOPEXCAM</div>
    <h1>Painel administrativo</h1>
    <p class="muted">Controle reuniões, votações, presença e decisões em um único lugar.</p>
    <form method="post" class="stack">
      <label>Login</label><input name="login" required placeholder="Login">
      <label>Senha</label><input name="password" type="password" required placeholder="Senha">
      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
  </div>
</div>{% endblock %}
